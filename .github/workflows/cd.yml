name: cd 

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6

      - name: Build app
        run: ./scripts/buildprod.sh

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
       
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      
      - name: Build docker image on Google Could
        run: gcloud builds submit --tag europe-north2-docker.pkg.dev/notely-500701/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-north2-docker.pkg.dev/notely-500701/notely-ar-repo/notely:latest --region europe-north2 --allow-unauthenticated --project notely-500701 --max-instances=4